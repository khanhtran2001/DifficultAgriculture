# This is a configuration file for training a YOLOv8s model on the Minneapple dataset. It specifies the dataset details, model architecture, training parameters, evaluation metrics, scoring parameters, augmentation parameters and more.


# General configuration
general:
  random_seed: [123, 456, 789]  # List of random seeds for reproducibility


# Dataset configuration
dataset_config:
  name: minneapple
  type: "yolo_detection"
  root_dir: /home/khanh/Projects/DifficultyAgri/datasets/minneapple/yolo_format/minneapple_yolo 
  train_mask_dir: /home/khanh/Projects/DifficultyAgri/datasets/minneapple/raw/MinneAppleDetection/test_data/detection/images
  num_classes: 1
  class_names: ["apple"]


# Model configuration
baseline_config:

  # Model overview and structure
  name: yolov8s
  model_type: "yolo"
  pretrained_weights_path: "/home/khanh/Projects/DifficultyAgri/finetuned_baseline_model/yolov8s.pt" 
  
  # Training parameters
  training_config:
    epochs: 10
    batch_size: 16
    input_size: 1024
    learning_rate: 0.01
    early_stopping_patience: 10 
    seed: 123

  # Augmentation parameters
    augmentation:
      hsv_h: 0.015      # Image HSV-Hue augmentation (fraction)
      hsv_s: 0.7        # Image HSV-Saturation augmentation (fraction)
      hsv_v: 0.4        # Image HSV-Value/Brightness augmentation (fraction)

      # Geometric (Spatial Variance - tuned to protect small bounding boxes)
      degrees: 10.0     # Image rotation (+/- deg). Kept small to prevent bbox distortion.
      translate: 0.1    # Image translation (+/- fraction).
      scale: 0.4        # Image scale (+/- gain). Reduced from default 0.5 to prevent shrinking objects too much.
      shear: 0.0        # Image shear (+/- deg). Kept at 0 as it severely distorts tight bboxes.
      perspective: 0.0  # Image perspective (+/- fraction). Kept at 0.

      # Flips
      fliplr: 0.5       # Image flip left-right (probability). Standard 50%.
      flipud: 0.0       # Image flip up-down (probability). Set to 0.5 ONLY for top-down datasets like Wheat. Keep 0.0 for MinneApple.

  # Evaluation metrics
  evaluation_config:
    image_size: 1024
    confidence_threshold: 0.001
    iou_threshold: 0.5
    max_detections: 10000
    metrics: ["mAP", "AP_50", "AP_75", "AP_small", "AP_medium", "AP_large"]


# Scoring configuration
scoring_config:
  type: "min_scorer"
  alpha: 0.5
  beta: 0.5
  iou_threshold: 0.5
  object_weight: 0.7
  false_positive_weight: 0.3

