# Global Wheat Head YOLO pipeline configuration
#
# Dataset expected layout:
#   root_dir/
#     train/images, train/labels
#     val/images,   val/labels
#     test/images,  test/labels (optional but recommended)


# General configuration
general:
  random_seed: [123, 456, 789]


# Dataset configuration
dataset_config:
  name: global_wheat_head
  type: "yolo_detection"
  root_dir: /home/khanh/Projects/DifficultyAgri/datasets/global_wheat_head/yolo_format/global_wheat_head_yolo
  train_mask_dir: null
  num_classes: 1
  class_names: ["wheat_head"]


# Model configuration
baseline_config:
  name: yolov8s
  model_type: "yolo"
  pretrained_weights_path: "/home/khanh/Projects/DifficultyAgri/finetuned_baseline_model/yolov8s.pt"

  training_config:
    epochs: 100
    batch_size: 16
    input_size: 1024
    learning_rate: 0.01
    early_stopping_patience: 8 
    seed: 123 

    # augmentation:
    #   hsv_h: 0.0
    #   hsv_s: 0.0
    #   hsv_v: 0.0

    #   # Geometric transforms disabled
    #   degrees: 0.0
    #   translate: 0.0
    #   scale: 0.0
    #   shear: 0.0
    #   perspective: 0.0

    #   # Flips disabled
    #   fliplr: 0.0
    #   flipud: 0.0

    #   # Ultralytics augmentation controls disabled
    #   mosaic: 0.0
    #   mixup: 0.0
    #   copy_paste: 0.0
    #   cutmix: 0.0
    #   close_mosaic: 0

    augmentation:
      hsv_h: 0.015      # Image HSV-Hue augmentation (fraction)
      hsv_s: 0.7        # Image HSV-Saturation augmentation (fraction)
      hsv_v: 0.4        # Image HSV-Value/Brightness augmentation (fraction)

      # Geometric (Spatial Variance - tuned to protect small bounding boxes)
      degrees: 10.0     # Image rotation (+/- deg). Kept small to prevent bbox distortion.
      translate: 0.1    # Image translation (+/- fraction).
      scale: 0.4        # Image scale (+/- gain). Reduced from default 0.5 to prevent shrinking objects too much.
      shear: 0.0        # Image shear (+/- deg). Kept at 0 as it severely distorts tight bboxes.
      perspective: 0.0  # Image perspective (+/- fraction). Kept at 0.

      # Flips
      fliplr: 0.5       # Image flip left-right (probability). Standard 50%.
      flipud: 0.0       # Image flip up-down (probability). Set to 0.5 ONLY for top-down datasets like Wheat. Keep 0.0 for MinneApple.

      # Ultralytics augmentation controls disabled
      mosaic: 0.0
      mixup: 0.0
      copy_paste: 0.0
      cutmix: 0.0
      close_mosaic: 0

  evaluation_config:
    image_size: 1024
    confidence_threshold: 0.001
    iou_threshold: 0.5
    max_detections: 600
    metrics: ["mAP", "AP_50", "AP_75", "AP_small", "AP_medium", "AP_large"]


# Scoring configuration
scoring_config:
  type: "min_scorer"
  alpha: 0.5
  beta: 0.5
  iou_threshold: 0.5
  weight_mode: "balance_correlation"  # fixed | mean_match | balance_correlation
  object_weight: 0.9
  false_positive_weight: 0.1


# Copy-paste augmentation configuration
augmentation_config:
  mode: "same_image_score_based_copy_paste"  # random_copy_paste | difficulty_based_copy_paste | same_image_score_based_copy_paste | same_image_random_copy_paste

  # Number of generated augmented images = int(num_train_images * dataset_ratio)
  dataset_ratio: 0.3

  # Paste policy
  target_density: 50 
  paste_relative_multiplier: 2.0
  max_paste_objects_per_image: 25

  # Mask and blending
  use_mask: false
  segmentation_masks_dir: null
  blending_method: "none"  # seamless_clone | alpha | none | lab_gaussian
  lab_gaussian_kernel_size: 15

  # Visual-domain clustering
  image_extensions: [".jpg", ".jpeg", ".png", ".bmp", ".webp"]
  auto_k: true
  max_k: 8

  # Score-targeted mining and sampling controls
  top_object_fraction: 1
  object_noise_cap: 1 
  max_object_area_px: 10000
  weight_scale: 0.5 
  background_weight_mode: "linear"  # linear | exponential
  object_weight_mode: "linear"  # linear | exponential

  # Reuse caps (null disables cap)
  max_background_reuse: 4
  max_object_reuse: 4

  # Same-image copy-paste transform controls
  same_image_scale_min: 0.75
  same_image_scale_max: 1.25
  same_image_rotation_deg: 15.0
  same_image_min_transformed_area_ratio: 0.5
  same_image_max_transformed_area_ratio: 2.0
  same_image_min_transformed_side_px: 8
  same_image_max_transformed_side_px: null
